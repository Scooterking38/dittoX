name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Generate pyproject.toml with hardcoded version
        run: |
          cat > pyproject.toml << EOF
          [build-system]
          requires = ["hatchling >= 1.26"]
          build-backend = "hatchling.build"

          [project]
          name = "dittoX"
          version = "${{ github.event.inputs.version }}"
          authors = [
            { name = "scooterking38", email = "mrwe3838@gmail.com" },
          ]
          description = "Mini-engine for generating and executing dynamic code templates: fast, readable, and incredibly flexible."
          readme = "README.md"
          requires-python = ">=3.9"
          classifiers = [
              "Programming Language :: Python :: 3",
              "Operating System :: OS Independent",
          ]
          license = "MIT"
          license-files = ["LICENSE*"]

          [project.urls]
          Homepage = "https://github.com/Scooterking38/dittoX"
          Issues = "https://github.com/Scooterking38/dittoX/issues"
EOF

      - name: Build & Publish to PyPI
        env:
          HATCH_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          hatch build
          hatch publish
