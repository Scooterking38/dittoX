name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build & Publish
        env:
          HATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Build and publish with dynamic version
          hatch build --version "$HATCH_VERSION"
          hatch publish --version "$HATCH_VERSION"
