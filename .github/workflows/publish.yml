name: Publish on Tag

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Extract version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate pyproject.toml
        run: |
          cat > pyproject.toml <<EOF
[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "dittoX"
version = "${VERSION}"
authors = [{ name = "scooterking38", email = "mrwe3838@gmail.com" }]
description = "Mini-engine for generating and executing dynamic code templates: fast, readable, and incredibly flexible."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }

[project.urls]
Homepage = "https://github.com/Scooterking38/dittoX"
Issues = "https://github.com/Scooterking38/dittoX/issues"
EOF

      - name: Build
        run: hatch build --sdist --wheel

      - name: Publish
        run: hatch publish -u __token__ -a "${{ secrets.PYPI_TOKEN }}"
